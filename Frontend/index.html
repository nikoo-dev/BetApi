<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetApi — Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-sm">
  <div class="auth-logo">BET<span>API</span></div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alertBox" class="alert alert-error"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to place your bets</p>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Log In</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none;">
      <h1>Create account</h1>
      <p class="subtitle">Join and start betting</p>

      <div class="form-group">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" required minlength="3" placeholder="nika123">
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" required minlength="6" placeholder="At least 6 characters">
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
    </form>
  </div>

  <p style="text-align:center; margin-top:20px; color:var(--muted); font-size:0.82rem;">
    Demo admin: admin@betlive.ge / Admin123!
  </p>
</div>

<script src="app.js"></script>
<script>
redirectIfAuth();

function switchTab(tab) {
  const isLogin = tab === "login";
  document.getElementById("loginTab").classList.toggle("active", isLogin);
  document.getElementById("registerTab").classList.toggle("active", !isLogin);
  document.getElementById("loginForm").style.display = isLogin ? "block" : "none";
  document.getElementById("registerForm").style.display = isLogin ? "none" : "block";
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "Logging in...";

  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("loginEmail").value,
        password: document.getElementById("loginPassword").value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert("alertBox", data.message || "Invalid email or password.");
      return;
    }

    setToken(data.token);
    setRefresh(data.refreshToken);
    setUser({ username: data.username, email: data.email, role: data.role });
    window.location.href = "games.html";
  } catch {
    showAlert("alertBox", "Could not connect to the server. Is the API running?");
  } finally {
    btn.disabled = false;
    btn.textContent = "Log In";
  }
});

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.textContent = "Creating account...";

  try {
    const res = await fetch(`${API_BASE}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("regUsername").value,
        email: document.getElementById("regEmail").value,
        password: document.getElementById("regPassword").value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      const msg = data.errors
        ? Object.values(data.errors).flat().join(" ")
        : (data.message || "Registration failed.");
      showAlert("alertBox", msg);
      return;
    }

    setToken(data.token);
    setRefresh(data.refreshToken);
    setUser({ username: data.username, email: data.email, role: data.role });
    window.location.href = "games.html";
  } catch {
    showAlert("alertBox", "Could not connect to the server. Is the API running?");
  } finally {
    btn.disabled = false;
    btn.textContent = "Create Account";
  }
});
</script>
</body>
</html>
