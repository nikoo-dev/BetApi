version: '3.8'

services:
  api:
    build: .
    container_name: betapi
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=betlive_db;Username=postgres;Password=postgres
      - JwtSettings__SecretKey=your-super-secret-key-change-this-in-production-min32chars
      - JwtSettings__Issuer=BetliveApi
      - JwtSettings__Audience=BetliveClient
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: betapi-db
    environment:
      POSTGRES_DB: betlive_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
